<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Painel Administrativo</title>
</head>
<body>

<h1>Painel Administrativo</h1>

<table border="1">

    <tr>
        <th>Protocolo</th>
        <th>Categoria</th>
        <th>Status</th>
        <th>Ação</th>
    </tr>

    <tr th:each="s : ${solicitacoes}">
        <td th:text="${s.protocolo}"></td>
        <td th:text="${s.categoria}"></td>
        <td th:text="${s.status}"></td>

        <td>
            <a th:href="@{/admin/solicitacao/{p}(p=${s.protocolo})}">
                Gerenciar
            </a>
        </td>
    </tr>

</table>

</body>
</html>
