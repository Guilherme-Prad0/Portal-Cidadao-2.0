<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Atualizar Status</title>
</head>
<body>

<h1>Atualizar Status</h1>

<form th:action="@{/admin/solicitacao/{p}/status(p=${solicitacao.protocolo})}"
      method="post">

    <label>Status:</label>

    <select name="status">
        <option
                th:each="s : ${statusList}"
                th:value="${s}"
                th:text="${s}">
        </option>
    </select>

    <br><br>

    <label>Responsável:</label>
    <input type="text" name="responsavel">

    <br><br>

    <label>Comentário:</label>
    <textarea name="comentario"></textarea>

    <br><br>

    <button type="submit">
        Atualizar
    </button>

</form>

</body>
</html>
