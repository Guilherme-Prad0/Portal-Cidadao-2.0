<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Detalhes do Usuário</title>
</head>
<body>

<h1>Detalhes do Usuário</h1>

<p><b>Nome:</b> <span th:text="${usuario.nome}"></span></p>

<p><b>CPF:</b> <span th:text="${usuario.cpfMascarado}"></span></p>

<p><b>Email:</b> <span th:text="${usuario.email}"></span></p>

<p><b>Telefone:</b> <span th:text="${usuario.telefone}"></span></p>

</body>
</html>
